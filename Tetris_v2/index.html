<!doctype html>
<html lang="en" data-motion="auto">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<meta name="description" content="A Guideline-accurate Tetris built with vanilla JavaScript.">
<meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data:; script-src 'self'; style-src 'self'; base-uri 'none'; form-action 'none'">
<title>Tetris</title>
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/backgrounds.css">
<link rel="stylesheet" href="css/animations.css">
<script src="js/file-guard.js"></script>
</head>
<body>

<canvas id="bg-a" class="backdrop" aria-hidden="true"></canvas>
<canvas id="bg-b" class="backdrop" aria-hidden="true"></canvas>
<div class="backdrop-scrim" aria-hidden="true"></div>

<main class="app" id="app">

  <section class="panel panel--hold" aria-labelledby="hold-label">
    <h2 class="panel__label" id="hold-label">Hold</h2>
    <canvas id="hold-canvas" class="preview" role="img"
            aria-label="Held piece"></canvas>
  </section>

  <section class="field" aria-label="Playfield">
    <div class="field__slab">
      <div class="field__stack" id="field-stack">
        <canvas id="board-canvas" class="layer" role="img"
                aria-label="Tetris playfield"></canvas>
        <canvas id="piece-canvas" class="layer" aria-hidden="true"></canvas>
        <canvas id="fx-canvas" class="layer" aria-hidden="true"></canvas>
      </div>
    </div>
  </section>

  <section class="panel panel--next" aria-labelledby="next-label">
    <h2 class="panel__label" id="next-label">Next</h2>
    <canvas id="next-canvas" class="preview" role="img"
            aria-label="Next pieces"></canvas>
  </section>

  <section class="panel panel--stats" aria-label="Statistics">
    <dl class="stats">
      <div class="stat">
        <dt class="stat__key">Score</dt>
        <dd class="stat__value stat__value--lead" id="stat-score">0</dd>
      </div>
      <div class="stat">
        <dt class="stat__key">Level</dt>
        <dd class="stat__value" id="stat-level">1</dd>
      </div>
      <div class="stat">
        <dt class="stat__key">Lines</dt>
        <dd class="stat__value" id="stat-lines">0</dd>
      </div>
    </dl>
    <p class="badge" id="badge" hidden></p>
    <div style="display: flex; gap: 8px;">
      <button class="btn btn--ghost" id="btn-scores" type="button">Scores</button>
      <button class="btn btn--ghost" id="btn-settings" type="button">Settings</button>
    </div>
  </section>

  <div class="touchpad" id="touchpad" hidden>
    <button class="tbtn" type="button" data-action="ROTATE_CCW" aria-label="Rotate counter-clockwise">⟲</button>
    <button class="tbtn" type="button" data-action="HOLD" aria-label="Hold">⇩</button>
    <button class="tbtn" type="button" data-action="PAUSE" aria-label="Pause">⏸</button>
    <button class="tbtn" type="button" data-action="ROTATE_CW" aria-label="Rotate clockwise">⟳</button>
  </div>

</main>

<div class="overlay" id="overlay" hidden>
  <div class="overlay__card" role="dialog" aria-modal="true"
       aria-labelledby="overlay-title" id="overlay-card">
    <h1 class="overlay__title" id="overlay-title">Tetris</h1>
    <p class="overlay__body" id="overlay-body"></p>
    <div class="overlay__actions" id="overlay-actions"></div>
  </div>
</div>

<p class="sr-only" role="status" aria-live="polite" id="live-region"></p>

<script type="module" src="js/main.js"></script>
</body>
</html>
