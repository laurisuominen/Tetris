name: Deploy Tetris to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The game now lives at the repo root, so it serves at the Pages base URL.
      # Assemble a clean _site with just the web assets — this is a copy, not a
      # build step (no bundler, no transpile), keeping the zero-tooling promise
      # while excluding .git, CI config and editor files from the published site.
      - name: Assemble site
        run: |
          mkdir _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.claude' \
            --exclude='_site' \
            --exclude='node_modules' \
            ./ _site/
            
          # Automate SW cache versioning by injecting the short Git SHA
          sed -i "s/const CACHE = '.*'/const CACHE = 'tetris-${GITHUB_SHA::7}'/g" _site/sw.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
